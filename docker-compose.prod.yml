name: diploma-thesis

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345}
      POSTGRES_DB: authdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  auth:
    build:
      context: ./Backend/AuthMicroservice
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 3002
      JWT_SECRET: ${JWT_SECRET:-MYSECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-MYSUPERSECRET}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      RABBITMQ_QUEUE: user_data
      PRISMA_DATABASE_AUTH_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-12345}@postgres:5432/authdb?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user:
    build:
      context: ./Backend/UserMicroservice
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 3004
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      RABBITMQ_QUEUE: user_data
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-supersecretbridgekey}
      PRISMA_DATABASE_USER_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-12345}@postgres:5432/userdb?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway:
    build:
      context: ./Backend/GatewayMicroservice
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 3001
      AUTH_MICROSERVICE_URL: http://auth:3002
      BRIDGE_MICROSERVICE_URL: http://bridge:3003
      USER_MICROSERVICE_URL: http://user:3004
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      - auth
      - user
      - bridge

  bridge:
    build:
      context: ./Backend/BridgeMicroservice
      dockerfile: Dockerfile
    restart: always
    environment:
      USER_MICROSERVICE_URL: http://user:3004/api
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-supersecretbridgekey}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-12345}@postgres:5432/bridgedb
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_TTS_API_KEY: ${GOOGLE_TTS_API_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-turbo}
    depends_on:
      postgres:
        condition: service_healthy
      user:
        condition: service_started

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    restart: always
    environment:
      DOMAIN: ${DOMAIN:-34-158-230-78.sslip.io}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway

volumes:
  postgres_data:
  rabbitmq_data:
  caddy_data:
  caddy_config:
