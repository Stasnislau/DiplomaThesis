version: 2
updates:
  - package-ecosystem: npm
    directory: /Frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Bundle minor + patch dev-dep bumps so we don't drown in PRs.
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /Backend/AuthMicroservice
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /Backend/UserMicroservice
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /Backend/GatewayMicroservice
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: pip
    directory: /Backend/BridgeMicroservice
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /Backend/AuthMicroservice
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /Backend/UserMicroservice
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /Backend/BridgeMicroservice
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /Backend/GatewayMicroservice
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /Frontend
    schedule:
      interval: monthly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
